services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ETL Pipeline
  etl:
    build: .
    container_name: ecommerce_etl
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
      POSTGRES_DB: ecommerce
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

volumes:
  postgres_data:
